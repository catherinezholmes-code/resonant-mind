name = "resonant-mind"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

workers_dev = true

# D1 database
[[d1_databases]]
binding = "DB"
database_name = "resonant-mind"
database_id = "2e84fcf1-c871-453a-9cba-38784811a97d"

# Vector search
[[vectorize]]
binding = "VECTORS"
index_name = "resonant-mind-vectors"

# R2 for image storage (enable R2 in Cloudflare dashboard first)
# [[r2_buckets]]
# binding = "R2_IMAGES"
# bucket_name = "resonant-mind-images"

# Cron triggers for subconscious daemon processing
[triggers]
crons = ["*/30 * * * *"]
