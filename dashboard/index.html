<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resonant Mind - Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="top-bar">
    <div class="hamburger" id="hamburger" onclick="toggleSidebar()">
      <span></span><span></span><span></span>
    </div>
    <div class="top-bar-title">RESONANT MIND</div>
    <div class="version-badge" id="version">v0.0.0</div>
    <button class="top-bar-action" id="auth-reset" type="button" onclick="clearApiToken()">Unlock</button>
  </header>

  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <nav>
      <!-- Identity - anchor at top -->
      <a href="#/identity" data-page="identity" class="nav-identity"><span class="icon">&#9733;</span> Identity</a>

      <!-- Living -->
      <div class="nav-group open">
        <div class="nav-group-header" onclick="toggleNavGroup(this)">
          <span class="group-label">Living</span>
          <span class="chevron">&#8250;</span>
        </div>
        <div class="nav-group-items">
          <a href="#/" data-page="home"><span class="icon">&#9632;</span> Now</a>
          <a href="#/emotional" data-page="emotional"><span class="icon">&#10084;</span> Weather</a>
        </div>
      </div>

      <!-- Memory -->
      <div class="nav-group open">
        <div class="nav-group-header" onclick="toggleNavGroup(this)">
          <span class="group-label">Memory</span>
          <span class="chevron">&#8250;</span>
        </div>
        <div class="nav-group-items">
          <a href="#/entities" data-page="entities"><span class="icon">&#9670;</span> Entities</a>
          <a href="#/observations" data-page="observations"><span class="icon">&#9675;</span> Observations</a>
          <a href="#/relations" data-page="relations"><span class="icon">&#8596;</span> Relations</a>
          <a href="#/images" data-page="images"><span class="icon">&#9635;</span> Images</a>
        </div>
      </div>

      <!-- Processing -->
      <div class="nav-group open">
        <div class="nav-group-header" onclick="toggleNavGroup(this)">
          <span class="group-label">Processing</span>
          <span class="chevron">&#8250;</span>
        </div>
        <div class="nav-group-items">
          <a href="#/proposals" data-page="proposals"><span class="icon">&#10132;</span> Proposals</a>
          <a href="#/orphans" data-page="orphans"><span class="icon">&#9785;</span> Orphans</a>
          <a href="#/patterns" data-page="patterns"><span class="icon">&#9788;</span> Patterns</a>
          <a href="#/tensions" data-page="tensions"><span class="icon">&#8651;</span> Tensions</a>
        </div>
      </div>

      <!-- Continuity -->
      <div class="nav-group open">
        <div class="nav-group-header" onclick="toggleNavGroup(this)">
          <span class="group-label">Continuity</span>
          <span class="chevron">&#8250;</span>
        </div>
        <div class="nav-group-items">
          <a href="#/threads" data-page="threads"><span class="icon">&#8594;</span> Threads</a>
          <a href="#/journals" data-page="journals"><span class="icon">&#9998;</span> Journals</a>
          <a href="#/archive" data-page="archive"><span class="icon">&#9731;</span> Archive</a>
        </div>
      </div>

      <!-- Search - utility at bottom -->
      <a href="#/search" data-page="search" class="nav-search"><span class="icon">&#8981;</span> Search</a>
    </nav>
  </aside>

  <main class="main" id="content">
    <div class="loading">Loading</div>
  </main>

  <div class="modal-overlay" id="modal">
    <div class="modal" id="modal-content"></div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
